name: Deploy Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Package Windows Desktop Binary
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - app: TMGS1SaveEditor
          - app: TMGS2SaveEditor
          - app: TMGS3SaveEditor
          - app: TMGS4SaveEditor

    steps:
    - name: Clone Repository Content
      uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Configure .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Compile Windows Executable
      run: dotnet publish "${{ matrix.app }}/${{ matrix.app }}.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/${{ matrix.app }}/win

    - name: Archive Windows Artifacts
      run: Compress-Archive -Path ./publish/${{ matrix.app }}/win/* -DestinationPath ${{ matrix.app }}-Windows.zip

    - name: Upload Windows Asset to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.app }}-Windows.zip
        allowUpdates: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Package macOS App Bundle
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - app: TMGS1SaveEditor
            display_name: "TMGS 1 Save Editor"
            bundle_id: "com.tmgs1.saveeditor"
          - app: TMGS2SaveEditor
            display_name: "TMGS 2 Save Editor"
            bundle_id: "com.tmgs2.saveeditor"
          - app: TMGS3SaveEditor
            display_name: "TMGS 3 Save Editor"
            bundle_id: "com.tmgs3.saveeditor"
          - app: TMGS4SaveEditor
            display_name: "TMGS 4 Save Editor"
            bundle_id: "com.tmgs4.saveeditor"

    steps:
    - name: Clone Repository Content
      uses: actions/checkout@v4

    - name: Configure .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Compile macOS Binary
      run: dotnet publish "${{ matrix.app }}/${{ matrix.app }}.csproj" -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish/${{ matrix.app }}/mac-raw

    - name: Assemble Native App Bundle Directory
      run: |
        APP_DIR="./publish/${{ matrix.app }}/mac/${{ matrix.app }}.app"
        mkdir -p "$APP_DIR/Contents/MacOS"
        mkdir -p "$APP_DIR/Contents/Resources"
        
        cp ./publish/${{ matrix.app }}/mac-raw/${{ matrix.app }} "$APP_DIR/Contents/MacOS/"
        chmod +x "$APP_DIR/Contents/MacOS/${{ matrix.app }}"
        
        cat <<EOF > "$APP_DIR/Contents/Info.plist"
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleName</key>
            <string>${{ matrix.app }}</string>
            <key>CFBundleDisplayName</key>
            <string>${{ matrix.display_name }}</string>
            <key>CFBundleIdentifier</key>
            <string>${{ matrix.bundle_id }}</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleExecutable</key>
            <string>${{ matrix.app }}</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF

    - name: Archive macOS Bundle
      run: |
        cd ./publish/${{ matrix.app }}/mac
        zip -r ../../../${{ matrix.app }}-Mac-ARM64.zip ${{ matrix.app }}.app

    - name: Upload macOS Asset to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.app }}-Mac-ARM64.zip
        allowUpdates: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}